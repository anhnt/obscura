version: "3.8"

services:
  obscura:
    image: ghcr.io/anhnt/obscura:latest
    container_name: obscura
    ports:
      - "9222:9222"
    environment:
      - PORT=9222
      - WORKERS=2
      - STEALTH=true
      - DISABLE_CONSOLE=true
    restart: unless-stopped
    
  # Example service to test connection
